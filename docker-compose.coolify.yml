# Coolify deployment (servidor terceros) — usa las imágenes ya construidas
# transferidas desde la VM agora (caldiy-web:coolify / caldiy-api:coolify),
# no compila en el servidor. Secretos vía variables de entorno de Coolify.
services:
  caldiy-db:
    image: postgres:17
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=calendso
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d calendso"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - caldiy-db-data:/var/lib/postgresql/data
    restart: unless-stopped

  caldiy-redis:
    image: redis:alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - caldiy-redis-data:/data
    restart: unless-stopped

  caldiy-web:
    image: caldiy-web:coolify
    ports:
      - "3050:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@caldiy-db:5432/calendso
      - DATABASE_DIRECT_URL=postgresql://postgres:${POSTGRES_PASSWORD}@caldiy-db:5432/calendso
      - DATABASE_HOST=caldiy-db:5432
      - NEXT_PUBLIC_WEBAPP_URL=https://calendar.humansoftware.mx
      - NEXTAUTH_URL=https://calendar.humansoftware.mx
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - CALENDSO_ENCRYPTION_KEY=${CALENDSO_ENCRYPTION_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://default:${REDIS_PASSWORD}@caldiy-redis:6379
      - CALCOM_TELEMETRY_DISABLED=1
      - NEXT_PUBLIC_LICENSE_CONSENT=agree
      - NODE_ENV=production
      - NEXT_PUBLIC_API_V2_URL=http://34.58.184.240:3053/api/v2
      - GOOGLE_API_CREDENTIALS=${GOOGLE_API_CREDENTIALS}
    depends_on:
      caldiy-db:
        condition: service_healthy
      caldiy-redis:
        condition: service_started
    restart: unless-stopped

  caldiy-api:
    image: caldiy-api:coolify
    ports:
      - "3053:80"
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@caldiy-db:5432/calendso
      - DATABASE_DIRECT_URL=postgresql://postgres:${POSTGRES_PASSWORD}@caldiy-db:5432/calendso
      - DATABASE_READ_URL=postgresql://postgres:${POSTGRES_PASSWORD}@caldiy-db:5432/calendso
      - DATABASE_WRITE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@caldiy-db:5432/calendso
      - NODE_ENV=production
      - API_PORT=80
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://default:${REDIS_PASSWORD}@caldiy-redis:6379
      - API_KEY_PREFIX=cal_
      - WEB_APP_URL=https://calendar.humansoftware.mx
      - IS_E2E=false
      - REWRITE_API_V2_PREFIX=true
      - STRIPE_API_KEY=sk_test_placeholder_no_stripe
      - STRIPE_WEBHOOK_SECRET=whsec_placeholder_no_stripe
      - IS_TEAM_BILLING_ENABLED=false
    depends_on:
      caldiy-db:
        condition: service_healthy
      caldiy-redis:
        condition: service_started
    restart: unless-stopped

volumes:
  caldiy-db-data:
  caldiy-redis-data:
